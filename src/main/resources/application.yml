spring:
  datasource:
    url: jdbc:mysql://localhost:3306/nbcam
    username: root
    password: ${DB_PASSWORD:default_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

## 암호화에 사용할 비밀키
jwt:
  secret:
    key: ${JWT_SECRET_KEY:jwt_secret_key}